server {
    listen 80;
    server_name 93.77.162.174; # Твой публичный IP

    # Путь к собранному фронтенду (dist)
    # ВАЖНО: Убедись, что путь совпадает с тем, где лежит проект на сервере
    root /home/tokarev/troudo/dist;
    index index.html;

    # Поддержка React Router (SPA)
    # Если файл не найден, отдаем index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование запросов к API на бэкенд
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Передаем реальный IP пользователя бэкенду
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Оптимизация: кеширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Логи
    error_log  /var/log/nginx/troudo-error.log;
    access_log /var/log/nginx/troudo-access.log;
}
