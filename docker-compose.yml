services:
  # 💾 DATABASE (Private, no ports exposed)
  db:
    image: postgres:15-alpine
    container_name: troudo_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-troudo_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-troudo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - troudo_network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-troudo_admin} -d ${POSTGRES_DB:-troudo_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🚀 REDIS (Private, with Persistence)
  redis:
    image: redis:7-alpine
    container_name: troudo_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - troudo_network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 📦 MINIO (S3-compatible storage)
  minio:
    image: minio/minio
    container_name: troudo_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - troudo_network
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 🛡️ DB BACKUP (Daily cron)
  db-backup:
    image: postgres:15-alpine
    container_name: troudo_db_backup
    volumes:
      - db_backups:/backups
    env_file: .env
    networks:
      - troudo_network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "while true; do 
        echo 'Starting backup...';
        pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql.gz;
        find /backups -name 'backup_*.sql.gz' -mtime +7 -delete;
        echo 'Backup finished. Sleeping 24h...';
        sleep 86400;
      done"
    restart: always

  # ⚙️ BACKEND
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: troudo_backend
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    networks:
      - troudo_network
    deploy:
      resources:
        limits:
          memory: 512M

  # 🌐 FRONTEND
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: troudo_frontend
    restart: always
    environment:
      - VIRTUAL_HOST=troudo.ru,www.troudo.ru
      - LETSENCRYPT_HOST=troudo.ru,www.troudo.ru
      - LETSENCRYPT_EMAIL=${EMAIL_USER}
    depends_on:
      - backend
    networks:
      - troudo_network
    deploy:
      resources:
        limits:
          memory: 256M

  # 🛡️ REVERSE PROXY & SSL
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
    networks:
      - troudo_network

  letsencrypt:
    image: nginxproxy/acme-companion
    container_name: nginx_letsencrypt
    restart: always
    depends_on:
      - nginx-proxy
    environment:
      - DEFAULT_EMAIL=${EMAIL_USER}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
    networks:
      - troudo_network

networks:
  troudo_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  db_backups:
